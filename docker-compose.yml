version: "3.8"
services:
    db:
      image: mysql:8
      container_name: epicbook-db
      restart: always
      environment:
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        MYSQL_DATABASE: ${MYSQL_DATABASE}
      ports:
        - "3306:3306"
      volumes:
        - db_data:/var/lib/mysql
        - ./db/init:/docker-entrypoint-initdb.d
      networks:
        - epicbook-net
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 20s

    app:
      build: .
      container_name: epicbook-app
      restart: always
      depends_on:
        - db 
      environment:
        DB_HOST: db
        DB_USER: root
        DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        DB_NAME: ${MYSQL_DATABASE}
      ports:
        - "8080:8080"
      networks:
        - epicbook-net
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8080"]
        interval: 10s
        timeout: 5s
        retries: 3
     
    nginx:
        image: nginx:latest
        container_name: epicbook-nginx
        restart: always
        ports:
           - "80:80"
        volumes:
           - ./nginx.conf:/etc/nginx/nginx.conf:ro
           - ./logs/nginx:/var/log/nginx
        depends_on:
           - app
        networks:
          - epicbook-net
   
volumes:
    db_data:

networks:
    epicbook-net:
